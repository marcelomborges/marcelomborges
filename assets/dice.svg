<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 240 88" width="240" height="88" role="img" aria-label="Rolling d20 dice">
  <defs>
    <g id="d20" transform="translate(0, 2)">
      <!-- Isometric icosahedron: front face + side/bottom facets (not a flat tetrahedron) -->
      <polygon points="0,-26 22,14 -22,14" fill="#1a2744" stroke="#388bfd" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="0,-26 -22,14 -34,2" fill="#0f1419" stroke="#388bfd" stroke-width="1.4" stroke-linejoin="round"/>
      <polygon points="0,-26 22,14 34,2" fill="#132036" stroke="#388bfd" stroke-width="1.4" stroke-linejoin="round"/>
      <polygon points="-22,14 -34,2 -12,24" fill="#0d1117" stroke="#388bfd" stroke-width="1.2" stroke-linejoin="round"/>
      <polygon points="22,14 34,2 12,24" fill="#101826" stroke="#388bfd" stroke-width="1.2" stroke-linejoin="round"/>
      <polygon points="-12,24 12,24 0,30" fill="#132036" stroke="#388bfd" stroke-width="1.2" stroke-linejoin="round"/>
      <polygon points="-22,14 12,24 0,14" fill="#161b22" stroke="#388bfd" stroke-width="1" stroke-linejoin="round" opacity="0.9"/>
      <polygon points="22,14 -12,24 0,14" fill="#151b24" stroke="#388bfd" stroke-width="1" stroke-linejoin="round" opacity="0.9"/>
      <line x1="0" y1="-26" x2="0" y2="14" stroke="#58a6ff" stroke-width="0.8" opacity="0.35"/>
      <line x1="-22" y1="14" x2="22" y2="14" stroke="#58a6ff" stroke-width="0.8" opacity="0.35"/>
    </g>
  </defs>

  <g transform="translate(52, 44)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;18;-14;22;-18;0" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="2.8s" repeatCount="indefinite"/>
      <use xlink:href="#d20" href="#d20"/>
      <text x="0" y="6" text-anchor="middle" fill="#a5d6ff" font-size="13" font-family="Consolas, Monaco, monospace" font-weight="700">20</text>
    </g>
  </g>

  <g transform="translate(188, 44)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;-16;12;-20;14;0" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="3.2s" repeatCount="indefinite"/>
      <use xlink:href="#d20" href="#d20"/>
      <text x="0" y="6" text-anchor="middle" fill="#79c0ff" font-size="13" font-family="Consolas, Monaco, monospace" font-weight="700">1</text>
    </g>
  </g>
</svg>
